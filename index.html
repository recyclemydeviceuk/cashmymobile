<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dn2sab6qc/image/upload/v1771700176/Cashmymobile_favicon_futypg.png" />
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dn2sab6qc/image/upload/v1771700176/Cashmymobile_favicon_futypg.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cash My Mobile – Sell Your Phone Fast & Easy</title>
  <meta property="og:image"
    content="https://images.unsplash.com/photo-1598327105666-5b89351cb315?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    body {
      margin: 0;
      background: #f9fafb;
      color: #111827;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #root {
      min-height: 100vh;
    }

    .app-shell-fallback {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(180deg, #fff5f5 0%, #ffffff 100%);
    }

    .app-shell-card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border: 1px solid #fecaca;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(220, 38, 38, 0.08);
      padding: 32px 24px;
      text-align: center;
    }

    .app-shell-icon {
      width: 56px;
      height: 56px;
      border-radius: 9999px;
      background: #fee2e2;
      color: #dc2626;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .app-shell-title {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 800;
    }

    .app-shell-text {
      margin: 0 auto 20px;
      max-width: 360px;
      font-size: 15px;
      line-height: 1.6;
      color: #4b5563;
    }

    .app-shell-loader {
      width: 40px;
      height: 40px;
      border-radius: 9999px;
      border: 4px solid #fecaca;
      border-top-color: #dc2626;
      margin: 0 auto 20px;
      animation: app-shell-spin 1s linear infinite;
    }

    .app-shell-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .app-shell-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 140px;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
    }

    .app-shell-link-primary {
      background: #dc2626;
      color: #ffffff;
    }

    .app-shell-link-secondary {
      background: #ffffff;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    @keyframes app-shell-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased">
  <div id="root">
    <div class="app-shell-fallback">
      <div class="app-shell-card">
        <div class="app-shell-icon">!</div>
        <div class="app-shell-loader"></div>
        <h1 class="app-shell-title">Loading Cash My Mobile</h1>
        <p class="app-shell-text">If this screen stays here, your browser or network may be blocking the site files. Please refresh the page or try another browser.</p>
        <div class="app-shell-actions">
          <a class="app-shell-link app-shell-link-primary" href="/">Reload page</a>
          <a class="app-shell-link app-shell-link-secondary" href="/contact">Contact support</a>
        </div>
        <noscript>
          <p class="app-shell-text">JavaScript is required to use this website. Please enable JavaScript and reload the page.</p>
        </noscript>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
